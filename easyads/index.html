<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>EasyAds</title>

<script>

(function () {

const lang=(navigator.language||"").toLowerCase();

const ruLangs=[
"ru",
"uk",
"be",
"kk",
"uz",
"az",
"hy",
"ka"
];

const isRussianLanguage=ruLangs.some(
code=>lang.startsWith(code)
);

if(isRussianLanguage){

window.location.replace("/ru/easy-ads/");
return;

}

if(lang.startsWith("vi")){

window.location.replace("/vn/easy-ads/");
return;

}

window.location.replace("/en/easy-ads/");

})();

</script>

</head>

<body>

<noscript>

<p>

Choose language:

<a href="/ru/easy-ads/">
Русский
</a>

|

<a href="/en/easy-ads/">
English
</a>

|

<a href="/vn/easy-ads/">
Tiếng Việt
</a>

</p>

</noscript>

</body>

</html>
