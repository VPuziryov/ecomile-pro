<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Test Form</title>
</head>

<body>

<h2>DiveAds Test Form</h2>

<form id="leadForm">

<p>
<input
type="text"
name="name"
placeholder="Name"
required>
</p>

<p>
<input
type="text"
name="contact"
placeholder="Contact"
required>
</p>

<p>
<input
type="text"
name="company"
placeholder="Company">
</p>

<p>
<input
type="text"
name="website"
placeholder="Website">
</p>

<p>
<textarea
name="message"
placeholder="Message"
required></textarea>
</p>

<p>
<button type="submit">
Send
</button>
</p>

</form>

<script>

const SCRIPT_URL =
"https://script.google.com/macros/s/AKfycbxT-t3U1K6PQD-NhhE22WoTpiKvCAH_obEPQ8hnqkmei9xSjlIJ9yxPBKTKRR7q-DHkvQ/exec";

document
.getElementById("leadForm")
.addEventListener("submit", async function(e){

e.preventDefault();

const form=e.target;

const data={

name:form.name.value,

contact:form.contact.value,

company:form.company.value,

website:form.website.value,

message:form.message.value

};

const response=await fetch(SCRIPT_URL,{

method:"POST",

body:JSON.stringify(data)

});

const result=await response.json();

if(result.success){

alert("Success!");

form.reset();

}else{

alert("Error");

}

});

</script>

</body>
</html>
